[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[hostname]
ssh_only = false
style = "bg:color_orange fg:color_fg0"
# This adds a small separator so your host name doesn't mash right into the directory path
format = "[@$hostname ]($style)"

[directory]
style = "bg:color_orange fg:color_fg0"
# Matches the background of the host block, then draws the clean transition arrow to aqua
format = "[ $path ]($style)[î‚°](fg:color_orange bg:color_aqua)"
truncation_length = 3
truncation_symbol = "â€¦/"
truncate_to_repo = false



[fill]
symbol = " " 

